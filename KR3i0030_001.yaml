body:
  text: 揚州芍藥譜宋王觀撰天地之功至大而神非人力之所能竊勝惟聖人為能體法其神以成天下之化其功盖出其下而曽不少加以力不然天地固亦有間而可窮其用矣余嘗論天下之物悉受天地之氣以生其小大短長辛酸甘苦與夫顔色之異計非人力之可容致巧於其間也今洛陽之牡丹維揚之芍藥受天地之氣以生而小大淺深一隨人力之工拙而移其天地所生之性故竒容異色間出於人間以人而盜天地之功而成之良可怪也然而天地之間事之紛紜出於其前不得而曉者此其一也洛陽土風之詳已見於今歐陽公之記而此不復論維揚大扺土壤肥膩於草木為宜禹貢曰厥草惟夭是也居人以治花相尚方九月十月時悉出其根滌以甘泉然後剥削老硬病腐之處揉調沙糞以培之易其故土凡花大約三年或二年一分不分則舊根老硬而侵蝕新芽故花不成就分之數則小而不舒不分與分之太數皆花之病也花之顔色之深淺與葉蘂之繁盛皆出於培㙲剥削之力花既萎落亟剪去其子屈盤枝條使不離散故脉理不上行而皆歸於根明年新花繁而色潤雜花根窠多不能致逺惟芍藥及時取根盡取本土貯以竹席之器雖數千里之逺一人可負數百本而不勞至於他州則㙲以沙糞雖不及維揚之盛而顔色亦非他州所有者比也亦有踰年即變而不成者此亦係夫土地之宜不宜而人力之至不至也花品舊傳龍興寺山子羅漢觀音彌陁之四院冠於此州其後民間稍稍厚賂以匄其本㙲培治事遂過於龍興之四院今則有朱氏之園最為冠絶南北二圃所種幾於五六萬株意其自古種花之盛未之有也朱氏當其花之盛開飾亭宇以待来逰者逾月不絶而朱氏未嘗厭也揚之人與西洛不異無貴賤皆喜戴花故開明橋之間方春之月拂旦有花市焉州宅舊有芍藥㕔在都㕔之後聚一州絶品於其中不下龍興朱氏之盛徃歳州將召移新守未至監䕶不密悉為人盜去易以凡品自是芍藥㕔徒有其名爾今芍藥有三十四品舊譜只取三十一種如緋單葉白單葉紅單葉不入名品之内其花皆六出維揚之人甚賤之余自熈寜八年季冬守官江都所見與夫所聞莫不詳熟又得八品焉非平日三十一品之比皆世之所難得今悉列於左舊譜三十一品分上中下七等此前人所定今更不易上之上冠羣芳大旋心冠子也深紅堆葉頂分四五旋其英密簇廣可及半尺髙可及六寸艶色絶妙可冠羣芳因以名之枝條硬葉踈大賽羣芳小旋心冠子也漸添紅而𦂳小枝條及緑葉並與大旋心一同凡品中言大葉小葉堆葉者皆花葉也言緑葉者謂枝葉也寳粧成髻子也色㣲紫於上十二大葉中密生曲葉回環裹抱團圓其髙八九寸廣半尺餘每一小葉上絡以金線綴以玉珠香欺蘭麝竒不可紀枝條硬而葉平盡天工桞浦青心紅冠子也於大葉中小葉密直妖媚出衆儻非造化無能為也枝硬而緑葉青薄曉粧新白纈子也如小旋心狀頂上四向葉端㸃小殷紅色每一朶上或三㸃或四㸃或五㸃象衣中之㸃纈也緑葉甚柔而厚條硬而絶低㸃粧紅紅纈子也色紅而小並與白纈子同緑葉㣲似瘦長上之下叠香英紫樓子也廣五寸髙盈尺於大葉中細葉二三十重上又聳大葉如樓閣狀枝條硬而高緑葉踈大而尖柔積嬌紅紅樓子也色淡紅與紫樓子不相異中之上醉西施大軟條冠子也色淡紅惟大葉有類大旋心狀枝條軟細漸以物扶助之緑葉色深厚踈而長以柔道粧成黄樓子也大葉中深黄小葉數重又上展淡黄大葉枝條硬而絶黄緑葉踈長而柔與紅紫者異此品非今日之黄樓子也乃黄絲頭中盛則或出四五大葉小類黄樓子盖本非黄樓子也掬香瓊青心玉板冠子也本自茅山来白英圑掬堅密平頭枝條硬而緑葉短且光素粧殘退紅茅山冠子也初開粉紅即漸退白青心而素淡稍若大軟條冠子緑葉短厚而硬試梅􅋔白冠子也白纈中無㸃纈者是也淺粧勻粉紅冠子也是紅纈中無㸃纈者也中之下醉嬌紅深紅楚州冠子也亦若小旋心狀中心𦂳堆大葉葉下亦有一重金線枝條髙緑葉踈而柔擬香英紫寳相冠子也紫樓子心中細葉上不堆大葉者妬嬌紅紅寳相冠子也紅樓子心中細葉上不堆大葉者縷金囊金線冠子也稍似細條深紅者於大葉中細葉下抽金線細細相雜條葉並同深紅冠子者下之上怨春紅硬條冠子也色絶淡甚類金線冠子而堆葉條硬而緑葉踈平稍若柔妬鵞黄黄絲頭也於大葉中一簇細葉雜以金線條髙緑葉踈柔蘸金香蘸金蘂紫單葉也是髻子開不成者於大葉中生小葉小葉尖蘸一線金色是也試濃粧緋多葉也緋葉五七重皆平頭條赤而緑葉硬皆紫色下之中宿粧殷紫髙多葉也條葉花並類緋多葉而枝葉絶髙平頭凡檻中雖多無先後開並齊整也取次粧淡紅多葉也色絶淡條葉正類緋多葉亦平頭也聚香絲紫絲頭也大葉中一叢紫絲細細是也枝條髙緑葉踈而柔簇紅絲紅絲頭也大葉中一簇紅絲細細是也枝葉並同紫者下之下效殷粧小矮多葉也與紫髙多葉一同而枝條低隨燥濕而出有三頭者雙頭者鞍子者銀緣者俱同根而土地肥瘠之異者也㑹三英三頭聚一蕚而開合歡芳雙頭並蔕而開二朶相背也擬繡韀鞍子也兩邊垂下如所乗鞍狀地絶肥而生銀含稜銀縁也葉端一稜白色新收八品御衣黄黄色淺而葉踈蘂差深散出於葉間其葉端色又㣲碧髙廣類黄樓子也此種宜升絶品黄樓子盛者五七層間以金線其香尤甚袁黄冠子宛如髻子間以金線色比鮑黄峡石黄冠子如金線冠子其色深如鮑黄鮑黄冠子大抵與大旋心同而葉差不旋色類鵞黄楊花冠子多葉白心色黄漸拂淺紅至葉端則色深紅間以金線湖纈紅色深淺相雜類湖纈黽池紅開須並蕚或三頭者大抵花類軟條也後論維揚東南一都㑹也自古號為繁盛自唐末亂離羣雄據有數經戰焚故遺基廢迹徃徃蕪没而不可見今天下一統井邑田野雖不及古之繁盛而人皆安生樂業不知有兵革之患民間及春之月惟以治花木飾亭榭以徃来逰樂為事其幸矣哉揚之芍藥甲天下其盛不知起於何代觀其今日之盛想古亦不減於此矣或者以謂自有唐若張祜杜牧盧仝崔涯章孝標李嶸王播皆一時名士而工於詩者也或觀於此或逰於此不為不乆而略無一言一句以及芍藥意其古未有之始盛於今未為通論也海棠之盛莫甚於西蜀而杜子羙詩名又重於張祜諸公在蜀日乆其詩僅數千篇而未嘗一言及海棠之盛張祜軰詩之不及芍藥不足疑也芍藥三十一品乃前人之所次余不敢輒易後八品乃得於民間而最佳者然花之名品時或變易又安知止此八品而已哉後將有出兹八品之外者余不得而知當俟来者以補之也揚州芍藥譜
